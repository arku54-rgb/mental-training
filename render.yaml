services:
  - type: web
    name: mental-training
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn mental-app:app
    envVars:
      - key: USE_CLOUD
        value: "true"
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PIN
        sync: false        # Renderダッシュボードで手動設定
      - key: SUPABASE_URL
        sync: false        # Renderダッシュボードで手動設定
      - key: SUPABASE_KEY
        sync: false        # Renderダッシュボードで手動設定
