services:
  - type: web
    name: mental-training
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn mental-app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: APP_PIN
        sync: false        # Renderダッシュボードで手動設定
      - key: DATABASE_URL
        sync: false        # Renderダッシュボードで手動設定
